services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: active-student-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - app-network
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    environment:
      - PHP_MEMORY_LIMIT=256M
      - COMPOSER_MEMORY_LIMIT=-1

  nginx:
    image: nginx:alpine
    container_name: active-student-nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app
    restart: unless-stopped

  mysql:
    image: mysql:8.0.45-debian
    container_name: active-student-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: attendance_db
      MYSQL_USER: attendance_user
      MYSQL_PASSWORD: attendance_password
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:alpine
    container_name: active-student-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - app-network
    command: redis-server --appendonly yes

  phpmyadmin:
    image: phpmyadmin:5.2.3-apache
    container_name: active-student-phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: attendance_user
      PMA_PASSWORD: attendance_password
      PMA_ARBITRARY: 1
    networks:
      - app-network
    depends_on:
      - mysql
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
