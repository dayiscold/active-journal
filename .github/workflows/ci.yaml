name: Student-Activity Pipeline

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev"]

jobs:
  laravel_tests:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: ./active-student

    services:
      mysql:
        image: mysql:8.0.45
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo, pdo_mysql, mysql, redis, zip, bcmath

      - name: Copy .env
        run: cp .env.example .env

      - name: Load dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: generate key
        run: php artisan key:generate

      - name: make migrations
        run: php artisan migrate --force
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: test_db
          DB_USERNAME: root
          DB_PASSWORD: root

      - name: Testing
        run: php artisan test
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: test_db
          DB_USERNAME: root
          DB_PASSWORD: root

  docker_build:
    runs-on: ubuntu-22.04
    needs: laravel_tests
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: ./active-student

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: docker build -t coldayyy/student-activity:latest -f Dockerfile .

      - name: Push Docker image
        run: docker push coldayyy/student-activity:latest
