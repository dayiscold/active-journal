name: Student-Activity Pipeline

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment for manual deploy'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  laravel_tests:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: ./active-student

    services:
      mysql:
        image: mysql:8.0.45
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo, pdo_mysql, mysql, redis, zip, bcmath

      - name: copy .env
        run: cp .env.example .env

      - name: load dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: generate key
        run: php artisan key:generate

      - name: make migrations
        run: php artisan migrate --force
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: test_db
          DB_USERNAME: root
          DB_PASSWORD: root

      - name: testing
        run: php artisan test
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: test_db
          DB_USERNAME: root
          DB_PASSWORD: root

  docker_staging:
    runs-on: ubuntu-22.04
    needs: laravel_tests
    if: github.ref == 'refs/heads/dev' || github.event.inputs.environment == 'staging'

    defaults:
      run:
        working-directory: ./active-student

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set tag
        id: tag
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "staging" ]] || [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "tag=staging" >> $GITHUB_OUTPUT
          else
            echo "tag=dev-latest" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/student-activity:${{ steps.tag.outputs.tag }} -f Dockerfile .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/student-activity:${{ steps.tag.outputs.tag }}

  docker_production:
    runs-on: ubuntu-22.04
    needs: laravel_tests
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'

    defaults:
      run:
        working-directory: ./active-student

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set tags
        id: tags
        run: |
          echo "latest_tag=${{ secrets.DOCKER_USERNAME }}/student-activity:latest" >> $GITHUB_OUTPUT
          echo "commit_tag=${{ secrets.DOCKER_USERNAME }}/student-activity:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "version_tag=${{ secrets.DOCKER_USERNAME }}/student-activity:${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ${{ steps.tags.outputs.latest_tag }} \
                       -t ${{ steps.tags.outputs.commit_tag }} \
                       -f Dockerfile .

      - name: Push Docker images
        run: |
          docker push ${{ steps.tags.outputs.latest_tag }}
          docker push ${{ steps.tags.outputs.commit_tag }}

  docker_build_manual:
    runs-on: ubuntu-22.04
    needs: laravel_tests
    if: github.event_name == 'workflow_dispatch'

    defaults:
      run:
        working-directory: ./active-student

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            docker build -t ${{ secrets.DOCKER_USERNAME }}/student-activity:manual-prod \
                         -t ${{ secrets.DOCKER_USERNAME }}/student-activity:${{ github.sha }} \
                         -f Dockerfile .
            docker push ${{ secrets.DOCKER_USERNAME }}/student-activity:manual-prod
            docker push ${{ secrets.DOCKER_USERNAME }}/student-activity:${{ github.sha }}
          else
            docker build -t ${{ secrets.DOCKER_USERNAME }}/student-activity:manual-staging -f Dockerfile .
            docker push ${{ secrets.DOCKER_USERNAME }}/student-activity:manual-staging
          fi